<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue-2</title>
    <link rel="stylesheet" href="bootstrap.css">
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"
        integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <script src="bootstrap.js"></script>
    <script src="./vue.3.5.13.js"></script>
</head>
<!-- OK -->
<body>
    <div id="app" class="container py-4">
        <div class="row g-4">
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title">數字計算器</h4>
                        <p class="card-text">目前數字：<strong>{{number}}</strong></p>
                        <div class="btn-group mb-3" role="group">
                            <button @click="number++" class="btn btn-primary">+</button>
                            <button @click="number--" class="btn btn-secondary">-</button>
                        </div>
                        <input v-model="number" type="number" class="form-control" placeholder="輸入數字">
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title">待辦事項</h4>
                        <div class="input-group mb-3">
                            <input type="text" v-model="todoInput" class="form-control" placeholder="輸入待辦項目">
                            <button @click="addToDoInput" class="btn btn-success">新增</button>
                        </div>
                        <ul class="list-group">
                            <li v-for="(todo, index) in todoList" :key="'todo-' + index" @click="delTodo(index)" class="list-group-item list-group-item-action">
                                {{todo}}
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="card-title mb-0">使用者清單</h4>
                            <button @click="addUser" class="btn btn-primary">新增使用者</button>
                        </div>
                        <div class="table-responsive">
                            <table id="table" class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>使用者ID</th>
                                        <th>使用者名稱</th>
                                        <th>使用者權限</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(user, index) in users" :key="user.id">
                                        <td>{{user.id}}</td>
                                        <td>{{user.username}}</td>
                                        <td>{{user.role == 1 ? '管理者' : '一般使用者'}}</td>
                                        <td>
                                            <div class="btn-group" role="group">
                                                <button @click="editUser(user)" class="btn btn-warning btn-sm">編輯</button>
                                                <button @click="delUser(user.id)" class="btn btn-danger btn-sm">刪除</button>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="userModal" class="modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{modal_title}}</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">使用者名稱</label>
                            <input class="form-control" type="text" v-model="userData.username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">使用者密碼</label>
                            <input class="form-control" type="text" v-model="userData.password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">使用者權限</label>
                            <input class="form-control" type="text" v-model="userData.role">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">關閉</button>
                        <button type="button" class="btn btn-primary" @click="saveUserData">儲存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const number = ref(10)
                const todoInput = ref("");
                const todoList = ref([]);
                const modal_title = ref('')
                const users = ref(null)
                const isLoading = ref(false)

                const userData = ref({
                    username: '',
                    password: '',
                    role: ''
                });

                const getUsers = async () => {
                    isLoading.value = true;
                    try {
                        const res = await fetch("./sql.php?do=getusers");
                        users.value = await res.json();
                    } catch (error) {
                        console.error("API 請求錯誤:", error);
                    } finally {
                        isLoading.value = false;
                    }
                }
                getUsers();

                const editUser = (userDataSend) => {
                    modal_title.value = "編輯"
                    userData.value = {
                        id: userDataSend.id,
                        username: userDataSend.username,
                        password: userDataSend.password,
                        role: userDataSend.role
                    }
                    $("#userModal").modal("show");
                }

                const addUser = () => {
                    modal_title.value = "新增"
                    userData.value = {
                        id: "",
                        username: "",
                        password: "",
                        role: ""
                    }
                    $("#userModal").modal("show")
                }

                const delUser = async (id) => {
                    try {
                        const res = await fetch("./sql.php?do=deluser&id=" + id);
                        const result = await res.text();
                        if (result) {
                            getUsers();
                        }
                    } catch (error) {
                        console.error("刪除失敗:", error);
                    }
                }

                const saveUserData = async () => {
                    if (userData.value.username == "") {
                        alert("使用者名稱為必填");
                        return; 
                    }
                    const params = new URLSearchParams(userData.value);

                    let apiUrl;
                    if (modal_title.value == "編輯") {
                        apiUrl = "./sql.php?do=edituser";
                    } else {
                        apiUrl = "./sql.php?do=adduser";
                    }
                    try {
                        const res = await fetch(apiUrl, {
                            method: "POST",
                            body: params
                        });

                        const result = await res.text();
                        if (result) {
                            $("#userModal").modal("hide");
                            getUsers();
                        }
                    } catch (error) {
                        console.error("儲存失敗:", error);
                    }
                }

                const addToDoInput = () => {
                    todoList.value.push(todoInput.value);
                    todoInput.value = "";
                }

                const delTodo = (index) => {
                    todoList.value.splice(index, 1);
                }

                return {
                    number, todoList, todoInput, addToDoInput, getUsers, users, delTodo,
                    userData, editUser, modal_title, saveUserData, addUser, delUser
                }
            }
        }).mount('#app')
    </script>
</body>

</html>
